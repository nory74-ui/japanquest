      ]

    function PixelArt({ name, size = 32, className = "" }) {
      const pattern = SPRITES_MAP[name];
      if (!pattern) return null;
      const w = pattern[0].length; const h = pattern.length;
      const pw = size / w; const ph = size / h;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className={`inline-block ${className}`}>
          {pattern.map((row, y) => row.split('').map((c, x) => {
            if (c === 'T' || !PAL[c]) return null;
            return <rect key={`${x}-${y}`} x={x*pw} y={y*ph} width={pw+0.5} height={ph+0.5} fill={PAL[c]} />
          }))}
        </svg>
      );
    }

    // ==========================================
    // 2. オーディオエンジン
    // ==========================================
    let audioCtx = null; let bgmTimer = null; let bgmMasterGain = null;
    let currentBGMType = null; let currentBGMStep = 0; let nextBGMTime = 0;

    const initAudio = () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    };

    const playTone = (freq, type, duration, vol = 0.1) => {
      if (!audioCtx || freq === 0) return;
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    };

    const playSE = (type) => {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      if (type === 'cursor') playTone(1500, 'square', 0.03, 0.05);
      if (type === 'decide') { playTone(1000, 'square', 0.03, 0.05); setTimeout(() => playTone(1500, 'square', 0.03, 0.05), 40); }
      if (type === 'cancel') playTone(200, 'sawtooth', 0.1, 0.05);
      if (type === 'step') playTone(100, 'sawtooth', 0.04, 0.03);
      if (type === 'encounter') {
        for(let i=0; i<6; i++) { setTimeout(() => playTone(1200, 'square', 0.04, 0.1), i*80); setTimeout(() => playTone(800, 'square', 0.04, 0.1), i*80 + 40); }
      }
      if (type === 'attack') {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.15);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(now + 0.15);
      }
      if (type === 'damage') {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.2);
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(now + 0.2);
      }
      if (type === 'levelup') {
        const notes = [ [349.23, 0.1], [349.23, 0.1], [349.23, 0.1], [349.23, 0.3], [329.63, 0.15], [349.23, 0.15], [392.00, 0.6] ];
        let t = 0; notes.forEach(([f, d]) => { setTimeout(() => playTone(f, 'square', d, 0.1), t); t += (d * 1000) + 20; });
      }
      if (type === 'escape') {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(now + 0.3);
      }
      if (type === 'win') {
        [523.25, 587.33, 659.25, 698.46, 783.99].forEach((f, i) => { setTimeout(() => playTone(f, 'square', i===4?0.5:0.1, 0.1), i * 120); });
      }
    };

      title: [[392, 0.3], [392, 0.3], [392, 0.3], [523, 0.9], [392, 0.6], [523, 0.3], [587, 0.3], [659, 0.3], [698, 0.3], [783, 1.2], [0, 0.6]],
      field: [[440, 0.5], [659, 0.5], [523, 0.5], [493, 0.5], [440, 0.5], [392, 0.5], [440, 1.0], [0, 0.5]],
      battle: [[261, 0.12], [277, 0.12], [293, 0.12], [311, 0.12], [329, 0.12], [349, 0.12], [370, 0.12], [392, 0.12],[392, 0.12], [370, 0.12], [349, 0.12], [329, 0.12], [311, 0.12], [293, 0.12], [277, 0.12], [261, 0.12]]
    };

    const stopBGM = () => {
      currentBGMType = null;
      if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
      if (bgmMasterGain) { try { bgmMasterGain.gain.setValueAtTime(0, audioCtx.currentTime); bgmMasterGain.disconnect(); } catch(e){} bgmMasterGain = null; }
    };

    const scheduleBGM = () => {
      if (!currentBGMType || !audioCtx || !bgmMasterGain) return;
      while (nextBGMTime < audioCtx.currentTime + 0.1) {
        const melody = BGM_DATA[currentBGMType];
        if (!melody) break;
        const [freq, duration] = melody[currentBGMStep];
        if (freq > 0) {
          const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
          osc.type = currentBGMType === 'battle' ? 'sawtooth' : 'square';
          osc.frequency.setValueAtTime(freq, nextBGMTime);
          gain.gain.setValueAtTime(0.04, nextBGMTime);
          gain.gain.exponentialRampToValueAtTime(0.001, nextBGMTime + duration * 0.9);
          osc.connect(gain); gain.connect(bgmMasterGain);
          osc.start(nextBGMTime); osc.stop(nextBGMTime + duration);
        }
        nextBGMTime += duration;
        currentBGMStep = (currentBGMStep + 1) % melody.length;
      }
      bgmTimer = setTimeout(scheduleBGM, 25);
    };

    const playBGM = (type) => {
      if (!audioCtx) return;
      stopBGM(); currentBGMType = type; currentBGMStep = 0; nextBGMTime = audioCtx.currentTime + 0.05;
      bgmMasterGain = audioCtx.createGain(); bgmMasterGain.connect(audioCtx.destination);
      scheduleBGM();

    function TypewriterMessage({ text, onComplete }) {
      const [disp, setDisp] = useState("");
      const onCompleteRef = useRef(onComplete);

      useEffect(() => { onCompleteRef.current = onComplete; }, [onComplete]);

      useEffect(() => {
        setDisp("");
        let i = 0; let currentText = "";
        const timer = setInterval(() => {
          if (i < text.length) {
            currentText += text.charAt(i);
            setDisp(currentText);
            i++;
          } else {
            clearInterval(timer);
            if (onCompleteRef.current) onCompleteRef.current();
          }
        }, 30);
        return () => clearInterval(timer);
      }, [text]);

      return <span style={{whiteSpace: "pre-wrap"}} className="word-break-all">{disp}</span>;
    }

            <button className="bg-gray-700 rounded-lg shadow-[0_4px_0_#444] active:shadow-[0_0px_0_#444] active:translate-y-1 flex justify-center items-center text-white text-xl sm:text-2xl" onPointerDown={(e)=>{e.preventDefault(); sim('ArrowUp')}}>▲</button>
            <div />
            <button className="bg-gray-700 rounded-lg shadow-[0_4px_0_#444] active:shadow-[0_0px_0_#444] active:translate-y-1 flex justify-center items-center text-white text-xl sm:text-2xl" onPointerDown={(e)=>{e.preventDefault(); sim('ArrowLeft')}}>◀</button>
            <div className="bg-gray-800 rounded-full w-6 h-6 sm:w-8 sm:h-8 place-self-center"></div>
            <button className="bg-gray-700 rounded-lg shadow-[0_4px_0_#444] active:shadow-[0_0px_0_#444] active:translate-y-1 flex justify-center items-center text-white text-xl sm:text-2xl" onPointerDown={(e)=>{e.preventDefault(); sim('ArrowRight')}}>▶</button>
            <div />
            <button className="bg-gray-700 rounded-lg shadow-[0_4px_0_#444] active:shadow-[0_0px_0_#444] active:translate-y-1 flex justify-center items-center text-white text-xl sm:text-2xl" onPointerDown={(e)=>{e.preventDefault(); sim('ArrowDown')}}>▼</button>
            <div />
          </div>
          <div className="flex gap-4 sm:gap-6 items-end h-full pb-4 sm:pb-6">
            <div className="flex flex-col items-center">
              <button className="bg-blue-700 w-14 h-14 sm:w-16 sm:h-16 rounded-full shadow-[0_6px_0_#003380] active:shadow-[0_0px_0_#003380] active:translate-y-[6px] text-white font-bold text-xl sm:text-2xl" onPointerDown={(e)=>{e.preventDefault(); sim('Escape')}}>B</button>
              <span className="text-gray-400 text-xs mt-1 font-sans font-bold">CANCEL</span>
            </div>
            <div className="flex flex-col items-center mb-4 sm:mb-6">
              <button className="bg-red-700 w-14 h-14 sm:w-16 sm:h-16 rounded-full shadow-[0_6px_0_#800000] active:shadow-[0_0px_0_#800000] active:translate-y-[6px] text-white font-bold text-xl sm:text-2xl" onPointerDown={(e)=>{e.preventDefault(); sim('Enter')}}>A</button>
              <span className="text-gray-400 text-xs mt-1 font-sans font-bold">DECIDE</span>
            </div>
          </div>

      );
    };

    // ==========================================
    // 6. 各画面コンポーネント
    // ==========================================
    const TITLE_BG_COLOR_FALLBACK = '#3b5988';

    function TitleScreen({ onNewGame, onLoadGame }) {
      const [cursor, setCursor] = useState(0); 
      const [bgColor, setBgColor] = useState(TITLE_BG_COLOR_FALLBACK); 

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'w' || e.key === 's') {
            playSE('cursor'); setCursor(c => (c === 0 ? 1 : 0));
          } else if (e.key === 'Enter' || e.key === ' ') {
            playSE('decide'); if (cursor === 0) onNewGame(); else onLoadGame();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [cursor, onNewGame, onLoadGame]);

      return (
        <div className="w-full h-full flex flex-col items-center justify-center relative p-4 min-h-0 overflow-hidden transition-colors duration-500" style={{ backgroundColor: bgColor }}>
          <div className="w-full flex-1 flex flex-col items-center justify-center min-h-0 mb-4 sm:mb-8 relative">
            <DqTitleLogo />
          </div>
          <div className="dq-window px-8 py-6 sm:px-12 sm:py-8 flex flex-col gap-4 sm:gap-6 text-lg sm:text-2xl shrink-0 shadow-2xl mb-2 sm:mb-4 z-20">
            <div className="relative cursor-pointer" onPointerDown={() => { setCursor(0); playSE('decide'); onNewGame(); }}>
              <span className="absolute -left-6 sm:-left-8 text-yellow-400">{cursor === 0 ? '▶' : '　'}</span>さいしょから
            </div>
            <div className="relative cursor-pointer" onPointerDown={() => { setCursor(1); playSE('decide'); onLoadGame(); }}>
              <span className="absolute -left-6 sm:-left-8 text-yellow-400">{cursor === 1 ? '▶' : '　'}</span>ふっかつのじゅもん
            </div>
          </div>
        </div>
      );
    }

    function BattleScreen({ pref, onWin, onEscape, heroStats, setHeroStats }) {
      const [quizzes, setQuizzes] = useState([]);
      const [qIdx, setQIdx] = useState(0); 
      const [eHp, setEHp] = useState(3); 
      const [phase, setPhase] = useState('APPEAR'); 
      const [msg, setMsg] = useState("");
      const [typingDone, setTypingDone] = useState(false);
      const [cursor, setCursor] = useState(0);

      useEffect(() => {
        setQuizzes([...pref.quizzes].sort(() => 0.5 - Math.random()));
        setMsg(`${pref.name} が あらわれた！\n（3もん せいかいで クリア！）`);
        setTypingDone(false); setPhase('APPEAR');
      }, [pref]);

      const handleKeyDown = useCallback((e) => {
        if (!typingDone) return;
        if (phase === 'COMMAND') {
          if (e.key === 'ArrowUp') { playSE('cursor'); setCursor(c => c > 1 ? c - 2 : c); }
          else if (e.key === 'ArrowDown') { playSE('cursor'); setCursor(c => c < 2 ? c + 2 : c); }
          else if (e.key === 'ArrowLeft') { playSE('cursor'); setCursor(c => c % 2 === 1 ? c - 1 : c); }
          else if (e.key === 'ArrowRight') { playSE('cursor'); setCursor(c => c % 2 === 0 ? c + 1 : c); }
          else if (e.key === 'Enter' || e.key === ' ') {
            playSE('decide');
            if (cursor === 0) { 
              setPhase('QUESTION'); setMsg(`${heroStats.name}の こうげき！\n\n${quizzes[qIdx % quizzes.length].text}`); setTypingDone(false); 
            }
            else if (cursor === 1) { setMsg(`しかし じゅもんが つかえない！`); setTypingDone(false); setPhase('RESULT_BACK'); }
            else if (cursor === 2) {
              const success = Math.random() > 0.3;
              if (success) { playSE('escape'); setMsg(`${heroStats.name} は にげだした！`); setTypingDone(false); setPhase('ESCAPE'); } 
              else { 
                setHeroStats(p => ({...p, hp: p.hp - 1})); 
                setMsg(`${heroStats.name} は にげだした！\nしかし まわりこまれてしまった！\n1の ダメージ！`); 
                setTypingDone(false); setPhase('ENEMY_TURN'); 
              }
            }
            else if (cursor === 3) { setMsg(`しかし なにも もっていない！`); setTypingDone(false); setPhase('RESULT_BACK'); }
          }
        } else if (phase === 'SELECTING') {
          const opts = quizzes[qIdx % quizzes.length].options;
          if (e.key === 'ArrowUp') { playSE('cursor'); setCursor(c => (c > 0 ? c - 1 : opts.length - 1)); }
          else if (e.key === 'ArrowDown') { playSE('cursor'); setCursor(c => (c < opts.length - 1 ? c + 1 : 0)); }
          else if (e.key === 'Enter' || e.key === ' ') {
            playSE('decide');
            const isCorrect = opts[cursor] === quizzes[qIdx % quizzes.length].correct;
            if (isCorrect) {
              playSE('attack'); setTimeout(() => playSE('correct'), 200);
              const newEHp = eHp - 1; setEHp(newEHp);
              if (newEHp <= 0) { setMsg(`せいかい！\n${pref.name} を やつけけた！`); setTypingDone(false); setPhase('RESULT_WIN'); } 
              else { setMsg(`せいかい！\n${pref.name} に 1の ダメージ！\n（あと ${newEHp}かい！）`); setTypingDone(false); setPhase('RESULT_BACK'); }
            } else {
              playSE('damage'); setHeroStats(p => ({...p, hp: p.hp - 1}));
              setMsg(`ミス！\n${heroStats.name} は 1の ダメージを うけた！\n(せいかい:${quizzes[qIdx % quizzes.length].correct})`);
              setTypingDone(false); setPhase('ENEMY_TURN');
            }
          }
        } else if (phase === 'APPEAR' || phase === 'RESULT_BACK') {
          if (e.key === 'Enter' || e.key === ' ') { 
            if (phase === 'RESULT_BACK') setQIdx(i => i + 1); 
            playSE('cursor'); setPhase('COMMAND'); setCursor(0); 
          }
        } else if (phase === 'QUESTION') {
          if (e.key === 'Enter' || e.key === ' ') { playSE('cursor'); setPhase('SELECTING'); setCursor(0); }
        } else if (phase === 'RESULT_WIN') {
          if (e.key === 'Enter' || e.key === ' ') {
            stopBGM(); playSE('win');
            const expGain = 5; let nLv = heroStats.level, nMax = heroStats.maxHp; let lvUpStr = "";
            if (heroStats.exp + expGain >= nLv * 10) { nLv++; nMax+=2; lvUpStr = `\n${heroStats.name} は レベル${nLv} に あがった！`; setTimeout(()=>playSE('levelup'), 600); }
            setHeroStats(p => ({...p, exp: p.exp + expGain, level: nLv, maxHp: nMax, hp: nMax}));
            setMsg(`${expGain}ポイントの けいけんちを かくとく！${lvUpStr}`);
            setTypingDone(false); setPhase('END_WIN');
          }
        } else if (phase === 'ENEMY_TURN') {
          if (e.key === 'Enter' || e.key === ' ') {
            if (heroStats.hp <= 0) { stopBGM(); playSE('damage'); setMsg(`ゆうしゃ は しんでしまった...`); setTypingDone(false); setPhase('END_LOSE'); } 
            else { setQIdx(i => i + 1); playSE('cursor'); setPhase('COMMAND'); setCursor(0); }
          }
        } else if (phase === 'ESCAPE') { if (e.key === 'Enter' || e.key === ' ') onEscape(); } 
        else if (phase === 'END_WIN') { if (e.key === 'Enter' || e.key === ' ') onWin(pref.id); } 
        else if (phase === 'END_LOSE') { if (e.key === 'Enter' || e.key === ' ') window.location.reload(); }
      }, [phase, typingDone, cursor, heroStats, quizzes, qIdx, pref, eHp]);

      useEffect(() => { window.addEventListener('keydown', handleKeyDown); return () => window.removeEventListener('keydown', handleKeyDown); }, [handleKeyDown]);

      return (
        <div className="absolute inset-0 bg-black z-40 flex flex-col p-2 sm:p-4 min-h-0">
          <div className="flex-1 flex flex-col items-center justify-center min-h-0">
             <PixelArt name={pref.monster} size={140} className={eHp<=0 && phase==='END_WIN'?'hidden':''} />
          </div>
          <div className="flex gap-2 h-40 sm:h-48 mt-auto shrink-0">
            {(phase === 'COMMAND' || phase === 'SELECTING') && (
              <div className="dq-window p-2 sm:p-4 w-5/12 sm:w-1/3 flex flex-col text-sm sm:text-lg leading-relaxed overflow-y-auto">
                {phase === 'COMMAND' ? (
                  <div className="grid grid-cols-2 gap-x-1 gap-y-4 h-full content-start mt-2">
                    <div>{cursor===0&&<span className="text-yellow-400">▶</span>}たたかう</div><div>{cursor===1&&<span className="text-yellow-400">▶</span>}じゅもん</div>
                    <div>{cursor===2&&<span className="text-yellow-400">▶</span>}にげる</div>  <div>{cursor===3&&<span className="text-yellow-400">▶</span>}どうぐ</div>
                  </div>
                ) : (
                  <div className="flex flex-col gap-2 sm:gap-3 overflow-y-auto pr-1">
                    {quizzes[qIdx % quizzes.length].options.map((opt, i) => (
                      <div key={i} className="flex"><span className="w-4 shrink-0">{cursor===i&&<span className="text-yellow-400">▶</span>}</span><span className="word-break-all">{opt}</span></div>
                    ))}
                  </div>
                )}
              </div>
            )}
            <div className={`dq-window p-3 sm:p-4 text-sm sm:text-lg leading-relaxed relative overflow-y-auto ${phase==='COMMAND'||phase==='SELECTING' ? 'flex-1' : 'w-full'}`}>
              <TypewriterMessage text={msg} onComplete={() => setTypingDone(true)} />
              {typingDone && phase !== 'COMMAND' && phase !== 'SELECTING' && <div className="absolute bottom-2 right-4 animate-blink text-yellow-400">▼</div>}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 7. メイン App
    // ==========================================
    function App() {
      const [gameState, setGameState] = useState('START'); 
      const [fb, setFb] = useState(null);
      const [user, setUser] = useState(null);
      
      const [heroStats, setHeroStats] = useState({ name: "", level: 1, hp: 15, maxHp: 15, exp: 0, gold: 0 });
      const [playerPos, setPlayerPos] = useState({ x: 68, y: 25 }); // 東京都スタート
      const [clearedPrefs, setClearedPrefs] = useState([]); 
      const [saves, setSaves] = useState([]);
      
      const [encounterPref, setEncounterPref] = useState(null);
      const [battlePref, setBattlePref] = useState(null);
      
      const [menuOpen, setMenuOpen] = useState(false);
      const [menuCursor, setMenuCursor] = useState(0);
      const [msg, setMsg] = useState("");
      
      const [statusOpen, setStatusOpen] = useState(false);

      const fetchSaves = async () => {
        try {
          const savesStr = localStorage.getItem('japan_quest_saves');
          if (savesStr) {
            const data = JSON.parse(savesStr);
            data.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
            setSaves(data);
          } else { setSaves([]); }
        } catch (e) { setSaves([]); }
      };

      const executeSave = async () => {
        try {
          const savesStr = localStorage.getItem('japan_quest_saves');
          let data = savesStr ? JSON.parse(savesStr) : [];
          const existingIndex = data.findIndex(s => s.heroStats.name === heroStats.name);
          const newSaveData = { heroStats, playerPos, clearedPrefs, updatedAt: new Date().toISOString() };
          if (existingIndex >= 0) data[existingIndex] = newSaveData; else data.push(newSaveData);
          localStorage.setItem('japan_quest_saves', JSON.stringify(data));
          return true;
        } catch (e) { return false; }
      };

      const handleMove = useCallback((dx, dy) => {
        if (gameState !== 'FIELD' || menuOpen || msg !== "" || statusOpen || encounterPref) return;
        setPlayerPos(prev => {
          const nx = prev.x + dx; const ny = prev.y + dy;
          if (ny < 0 || ny >= mapLayout.length || nx < 0 || nx >= mapLayout[0].length) return prev;
          if (mapLayout[ny][nx] === '~') return prev; 
          playSE('step');
          return { x: nx, y: ny };
        });
      }, [gameState, menuOpen, msg, statusOpen, encounterPref]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (gameState === 'FIELD' && statusOpen) {
            if (e.key === 'Escape' || e.key === 'Enter' || e.key === ' ') { playSE('cancel'); setStatusOpen(false); }
          } else if (gameState === 'FIELD' && encounterPref) {
            if (e.key === 'Enter' || e.key === ' ') { setBattlePref(encounterPref); setEncounterPref(null); setGameState('BATTLE'); playBGM('battle'); }
            else if (e.key === 'Escape') { playSE('cancel'); setEncounterPref(null); playBGM('field'); }
          } else if (gameState === 'FIELD' && !encounterPref) {
            if (msg !== "") {
               if (e.key === 'Enter' || e.key === ' ' || e.key === 'Escape') { playSE('cursor'); setMsg(""); }
               return;
            }
            if (!menuOpen) {
              if (e.key === 'ArrowUp') handleMove(0, -1);
              else if (e.key === 'ArrowDown') handleMove(0, 1);
              else if (e.key === 'ArrowLeft') handleMove(-1, 0);
              else if (e.key === 'ArrowRight') handleMove(1, 0);
              else if (e.key === 'Enter' || e.key === ' ') { playSE('decide'); setMenuOpen(true); setMenuCursor(0); }
            } else {
              if (e.key === 'Escape') { playSE('cancel'); setMenuOpen(false); }
              else if (e.key === 'ArrowUp') { playSE('cursor'); setMenuCursor(c => c > 1 ? c - 2 : c); }
              else if (e.key === 'ArrowDown') { playSE('cursor'); setMenuCursor(c => c < 4 ? c + 2 : c); }
              else if (e.key === 'ArrowLeft') { playSE('cursor'); setMenuCursor(c => c % 2 === 1 ? c - 1 : c); }
              else if (e.key === 'ArrowRight') { playSE('cursor'); setMenuCursor(c => c % 2 === 0 ? c + 1 : c); }
              else if (e.key === 'Enter' || e.key === ' ') {
                playSE('decide'); setMenuOpen(false);
                if (menuCursor === 0) setMsg("だれも いないようだ。");
                else if (menuCursor === 1) setMsg("しかし じゅもんが つかえない！");
                else if (menuCursor === 2) setStatusOpen(true); 
                else if (menuCursor === 3) setMsg("しかし なにも もっていない！");
                else if (menuCursor === 4) {
                  const prefOnFoot = prefecturesData.find(p => p.x === playerPos.x && p.y === playerPos.y);
                  if (prefOnFoot && !clearedPrefs.includes(prefOnFoot.id)) {
                    stopBGM(); playSE('encounter'); setEncounterPref(prefOnFoot);
                  } else {
                    setMsg("なにも みつからなかった。");
                  }
                }
                else if (menuCursor === 5) {
                   setMsg("ぼうけんのしょ に きろくした！"); executeSave();
                }
              }
            }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameState, encounterPref, handleMove, menuOpen, menuCursor, msg, statusOpen, playerPos, clearedPrefs]);

      // --- パフォーマンス最適化 (useMemo) ---
      // 100x65 = 6500タイルの描画を歩くたびに行うと重いため、メモ化して必要な時だけ再描画する
      const renderedMapTiles = useMemo(() => {
        return mapLayout.map((row, y) => row.split('').map((tile, x) => {
          const tileData = TileMap[tile] || TileMap['~']; // Fallback fix
          const bg = tileData.bg; const iconName = tileData.icon;
          const pref = prefecturesData.find(p => p.x === x && p.y === y);
          return (
            <div key={`${x}-${y}`} className="absolute flex items-center justify-center border-t border-l border-black/10" style={{ left: x * TILE_SIZE, top: y * TILE_SIZE, width: TILE_SIZE, height: TILE_SIZE, backgroundColor: bg }}>
              {iconName && <PixelArt name={iconName} size={30} />}
              {pref && <PixelArt name="castle" size={32} />}
              {pref && clearedPrefs.includes(pref.id) && <div className="absolute -top-1 right-0 text-sm text-yellow-300 font-bold drop-shadow-md">★</div>}
            </div>
          );
        }));
      }, [clearedPrefs]);

      // --- 描画 ---
      if (gameState === 'START') {
        return (
          <div className="w-screen h-[100dvh] flex items-center justify-center bg-black cursor-pointer text-white"
               onClick={() => { initAudio(); playBGM('title'); setGameState('TITLE'); }}>
            <div className="text-2xl animate-blink tracking-widest font-bold">TAP TO START</div>
          </div>
        );
      }

      return (
        <div className="w-screen h-[100dvh] flex flex-col bg-black text-white select-none items-center overflow-hidden">
          
          <div className="w-full max-w-2xl flex-1 relative overflow-hidden bg-black border-x-4 border-gray-900 flex flex-col min-h-0">
            {gameState === 'TITLE' && <TitleScreen onNewGame={() => setGameState('NAME_INPUT')} onLoadGame={async () => { await fetchSaves(); setGameState('LOAD_GAME'); }} />}
            
            {gameState === 'NAME_INPUT' && (
              <div className="w-full h-full flex items-center justify-center p-4">
                <div className="dq-window p-8 flex flex-col gap-6 w-full max-w-sm">
                  <p className="text-xl sm:text-2xl">なまえを いれてください</p>
                  <input type="text" value={heroStats.name} onChange={e => setHeroStats({...heroStats, name: e.target.value.substring(0,4)})} autoFocus
                    className="bg-black text-white border-2 border-white p-2 text-2xl outline-none uppercase" />
                  <div className="flex justify-end gap-6 text-xl">
                    <button onClick={() => { if(heroStats.name){ playSE('decide'); setPlayerPos({x:68,y:25}); setClearedPrefs([]); playBGM('field'); setGameState('FIELD'); } }} className="hover:text-yellow-400 border border-white px-4 py-2">おわる</button>
                  </div>
                </div>
              </div>
            )}

            {gameState === 'LOAD_GAME' && (
              <div className="w-full h-full flex items-center justify-center p-4">
                <div className="dq-window p-6 flex flex-col gap-4 w-full max-w-md max-h-[80%] overflow-y-auto">
                  <p className="text-xl sm:text-2xl mb-4 text-yellow-400">どの ぼうけんのしょ から はじめる？</p>
                  {saves.length === 0 ? <p className="text-gray-400 text-xl">きろく が ありません</p> : (
                    saves.map((s, i) => (
                      <button key={i} onClick={() => { playSE('decide'); setHeroStats(s.heroStats); setPlayerPos(s.playerPos); setClearedPrefs(s.clearedPrefs || []); playBGM('field'); setGameState('FIELD'); }} className="text-left hover:text-yellow-400 mb-2 text-lg sm:text-xl border-b border-gray-600 pb-2">
                        {s.heroStats.name} (LV {s.heroStats.level}) - {s.clearedPrefs.length}/47
                      </button>
                    ))
                  )}
                  <div className="mt-4 flex justify-end">
                    <button onClick={() => { playSE('cancel'); setGameState('TITLE'); }} className="text-xl hover:text-yellow-400 border border-white px-4 py-2">もどる</button>
                  </div>
                </div>
              </div>
            )}

            {(gameState === 'FIELD' || gameState === 'BATTLE' || gameState === 'GAMECLEAR') && (
              <div className="flex-1 w-full h-full relative min-h-0">
                <div className="absolute top-2 left-2 sm:top-4 sm:left-4 dq-window p-2 sm:p-4 z-50 text-xs sm:text-base leading-relaxed tracking-widest min-w-[100px] opacity-90">
                  {heroStats.name}<br/>
                  ＬＶ　{heroStats.level.toString().padStart(3, ' ')}<br/>
                  ＨＰ　{heroStats.hp.toString().padStart(3, ' ')}<br/>
                  Ｇ　　{heroStats.gold.toString().padStart(3, ' ')}<br/>
                  Ｅ　　{heroStats.exp.toString().padStart(3, ' ')}
                </div>

                {gameState === 'FIELD' && (
                  <div className="w-full h-full relative overflow-hidden bg-[#0040A0]">
                    <div className="absolute left-1/2 top-1/2 transition-transform duration-200"
                         style={{ transform: `translate(calc(-50% - ${playerPos.x * TILE_SIZE}px), calc(-50% - ${playerPos.y * TILE_SIZE}px))` }}>
                      
                      {/* メモ化したマップをここに描画 */}
                      {renderedMapTiles}

                      <div className="absolute flex items-center justify-center z-10" style={{ left: playerPos.x * TILE_SIZE, top: playerPos.y * TILE_SIZE, width: TILE_SIZE, height: TILE_SIZE }}>
                        <PixelArt name="hero" size={28} className="animate-pulse" />
                      </div>
                    </div>

                    {menuOpen && (
                      <div className="absolute top-2 right-2 sm:top-4 sm:right-4 z-40">
                        <div className="dq-window p-3 sm:p-4 flex flex-col text-sm sm:text-lg leading-loose w-[160px] sm:w-[220px]">
                          <div className="grid grid-cols-2 gap-x-1 gap-y-2">
                            <div>{menuCursor===0&&<span className="text-yellow-400">▶</span>}はなす</div>   <div>{menuCursor===1&&<span className="text-yellow-400">▶</span>}じゅもん</div>
                            <div>{menuCursor===2&&<span className="text-yellow-400">▶</span>}つよさ</div>   <div>{menuCursor===3&&<span className="text-yellow-400">▶</span>}どうぐ</div>
                            <div>{menuCursor===4&&<span className="text-yellow-400">▶</span>}しらべる</div> <div>{menuCursor===5&&<span className="text-yellow-400">▶</span>}セーブ</div>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* STATUS WINDOW (つよさ) */}
                    {statusOpen && (
                      <div className="absolute inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                        <div className="dq-window p-6 flex flex-col gap-4 w-full max-w-md h-[90%] text-sm sm:text-base leading-relaxed">
                          <h2 className="text-lg sm:text-xl text-yellow-400 font-bold border-b-2 border-white pb-2 text-center">{heroStats.name} の つよさ</h2>
                          
                          <div className="flex justify-around bg-gray-900 p-2 rounded border border-gray-700">
                            <div>ＬＶ: <span className="text-yellow-400">{heroStats.level}</span></div>
                            <div>ＨＰ: <span className="text-yellow-400">{heroStats.hp}</span> / {heroStats.maxHp}</div>
                            <div>ＥＸ: <span className="text-yellow-400">{heroStats.exp}</span></div>
                          </div>
                          
                          <div className="mt-2 text-yellow-400 text-center font-bold">【せいはした ち】 ({clearedPrefs.length} / 47)</div>
                          
                          <div className="flex-1 overflow-y-auto bg-gray-900 border-2 border-gray-700 p-3 flex flex-col">
                            {clearedPrefs.length === 0 ? (
                              <div className="text-gray-400 text-center mt-4">まだ ありません</div>
                            ) : (
                              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                {prefecturesData.filter(p => clearedPrefs.includes(p.id)).map(p => (
                                  <div key={p.id} className="text-center bg-black border border-gray-600 py-1 px-2 rounded truncate">
                                    {p.name}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                          
                          <div className="text-center text-yellow-400 animate-blink mt-2 cursor-pointer pt-2" onPointerDown={() => { playSE('cancel'); setStatusOpen(false); }}>
                            ▼ とじる (Bボタン)
                          </div>
                        </div>
                      </div>
                    )}

                    {encounterPref && (
                      <div className="absolute inset-0 bg-black/60 z-40 flex items-center justify-center p-4">
                        <div className="dq-window p-6 text-center text-sm sm:text-lg leading-relaxed max-w-sm w-full">
                          あ！ {encounterPref.name} だ！<br/>クイズに ちょうせんする？<br/><br/>
                          <span className="text-yellow-400 text-xs sm:text-sm mt-4 inline-block">※Aで「はい」、Bで「いいえ」</span>
                        </div>
                      </div>
                    )}

                    {(msg !== "" && !encounterPref && !statusOpen) && (
                      <div className="absolute bottom-2 left-2 right-2 sm:bottom-4 sm:left-4 sm:right-4 z-40">
                        <div className="dq-window p-3 sm:p-4 text-sm sm:text-lg leading-relaxed relative min-h-[80px] overflow-y-auto">
                          <TypewriterMessage text={msg} />
                          <div className="absolute bottom-2 right-4 animate-blink text-yellow-400">▼</div>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {gameState === 'BATTLE' && battlePref && (
                  <BattleScreen 
                    pref={battlePref} heroStats={heroStats} setHeroStats={setHeroStats}
                    onWin={(id) => {
                      const newC = [...clearedPrefs, id]; setClearedPrefs(newC); setBattlePref(null);
                      if(newC.length >= 47){ stopBGM(); playSE('clear'); setGameState('GAMECLEAR'); } 
                      else { setGameState('FIELD'); playBGM('field'); }
                    }}
                    onEscape={() => { setBattlePref(null); setGameState('FIELD'); playBGM('field'); }}
                  />
                )}

                {gameState === 'GAMECLEAR' && (
                  <div className="absolute inset-0 bg-black z-50 flex flex-col items-center justify-center p-8 space-y-8">
                    <h1 className="text-3xl sm:text-5xl text-yellow-400 font-bold tracking-widest animate-blink text-center leading-tight">JAPAN QUEST<br/>ALL CLEARED!</h1>
                    <div className="dq-window p-6 text-sm sm:text-lg leading-loose text-center">
                      ゆうしゃ {heroStats.name} は<br/>４７とどうふけん の<br/>すべての ちしき を えた！<br/><br/>そして でんせつ が はじまった...
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* 下部コントローラー */}
          <div className="w-full max-w-2xl shrink-0">
             <VirtualController />
          </div>
          
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
