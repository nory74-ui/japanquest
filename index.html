<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JAPAN QUEST</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap');
    
    body { 
      margin: 0; padding: 0; overflow: hidden; background-color: black; 
      user-select: none; touch-action: manipulation; -webkit-user-select: none;
    }
    .font-dotgothic { font-family: 'DotGothic16', sans-serif; }
    .font-pressstart { font-family: 'Press Start 2P', cursive; }
    
    .pixel-window { 
      border: 3px solid white; 
      background-color: black; 
      color: white; 
      border-radius: 6px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
    }
    @media (min-width: 640px) {
      .pixel-window { border-width: 4px; border-radius: 8px; }
    }
    ::-webkit-scrollbar { width: 4px; background: transparent; }
    ::-webkit-scrollbar-thumb { background: white; border-radius: 4px; }

    /* 光のアニメーション */
    @keyframes pulse-glow {
      0% { filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 10px #fef08a); }
      50% { filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0-30px #fef08a); }
      100% { filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 10px #fef08a); }
    }
    .sword-glow { animation: pulse-glow 2s infinite ease-in-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDocs, collection, query } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // ==========================================
    // 1. Firebase 設定と初期化
    // ==========================================
    const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'japan-quest-v1';

    window.JQ_FB = { auth, db, appId, firestore: { doc, setDoc, getDocs, collection, query } };
    window.JQ_AUTH_INIT = async () => {
      if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
        return await signInWithCustomToken(auth, window.__initial_auth_token);
      } else {
        return await signInAnonymously(auth);
      }
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, Fragment, useRef } = React;

    // ==========================================
    // 2. オーディオエンジン
    // ==========================================
    let audioCtx = null;
    let bgmTimer = null;
    let bgmMasterGain = null;
    let currentBGMType = null;
    let currentBGMStep = 0;
    let nextBGMTime = 0;

    const initAudio = () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    };

    const playTone = (freq, type, duration, vol = 0.1) => {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    };

    const playSE = (type) => {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      if (type === 'cursor') {
        playTone(880, 'square', 0.05, 0.05);
      } else if (type === 'decide') {
        setTimeout(() => playTone(880, 'square', 0.05, 0.05), 0);
        setTimeout(() => playTone(1108, 'square', 0.05, 0.05), 100);
      } else if (type === 'attack') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.15);
      } else if (type === 'correct') {
        setTimeout(() => playTone(523.25, 'square', 0.1, 0.1), 0);
        setTimeout(() => playTone(659.25, 'square', 0.1, 0.1), 100);
        setTimeout(() => playTone(783.99, 'square', 0.2, 0.1), 200);
      } else if (type === 'wrong') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.setValueAtTime(0.2, now + 0.2);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.3);
      } else if (type === 'win') {
        setTimeout(() => playTone(523.25, 'square', 0.1, 0.1), 0);
        setTimeout(() => playTone(587.33, 'square', 0.1, 0.1), 100);
        setTimeout(() => playTone(659.25, 'square', 0.1, 0.1), 200);
        setTimeout(() => playTone(698.46, 'square', 0.1, 0.1), 300);
        setTimeout(() => playTone(783.99, 'square', 0.4, 0.1), 400);
      } else if (type === 'step') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(20, now + 0.05);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.05);
      } else if (type === 'cancel') {
        playTone(440, 'square', 0.1, 0.05);
      }
    };

    const BGM_DATA = {
      title: [[392,0.2],[392,0.2],[392,0.2],[523.25,0.6],[392,0.6],[523.25,0.4],[587.33,0.4],[659.25,0.8]],
      field: [[261.63,0.25],[329.63,0.25],[392,0.25],[329.63,0.25],[293.66,0.25],[349.23,0.25],[440,0.25],[349.23,0.25]],
      battle: [[130.81,0.15],[130.81,0.15],[146.83,0.15],[130.81,0.15],[130.81,0.15],[155.56,0.15],[130.81,0.15],[146.83,0.15]]
    };

    const stopBGM = () => {
      currentBGMType = null;
      if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
      if (bgmMasterGain) {
        try {
          bgmMasterGain.gain.cancelScheduledValues(audioCtx.currentTime);
          bgmMasterGain.gain.setValueAtTime(0, audioCtx.currentTime);
          bgmMasterGain.disconnect();
        } catch(e){}
        bgmMasterGain = null;
      }
    };

    const scheduleBGM = () => {
      if (!currentBGMType || !audioCtx || !bgmMasterGain) return;
      while (nextBGMTime < audioCtx.currentTime + 0.1) {
        const melody = BGM_DATA[currentBGMType];
        const [freq, duration] = melody[currentBGMStep];
        if (freq > 0) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = currentBGMType === 'battle' ? 'sawtooth' : 'square';
          osc.frequency.setValueAtTime(freq, nextBGMTime);
          gain.gain.setValueAtTime(0.04, nextBGMTime);
          gain.gain.exponentialRampToValueAtTime(0.001, nextBGMTime + duration * 0.9);
          osc.connect(gain);
          gain.connect(bgmMasterGain);
          osc.start(nextBGMTime);
          osc.stop(nextBGMTime + duration);
        }
        nextBGMTime += duration;
        currentBGMStep = (currentBGMStep + 1) % melody.length;
      }
      bgmTimer = setTimeout(scheduleBGM, 25);
    };

    const playBGM = (type) => {
      if (!audioCtx) return;
      stopBGM();
      currentBGMType = type;
      currentBGMStep = 0;
      nextBGMTime = audioCtx.currentTime + 0.05;
      bgmMasterGain = audioCtx.createGain();
      bgmMasterGain.connect(audioCtx.destination);
      scheduleBGM();
    };

    // ==========================================
    // 3. タイトル画面 (Tを聖剣化したSVG)
    // ==========================================
    function TitleScreen({ onNewGame, onLoadGame }) {
      const [cursorY, setCursorY] = useState(0); 

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'w' || e.key === 's') {
            playSE('cursor'); setCursorY(c => (c === 0 ? 1 : 0));
          } else if (e.key === 'Enter' || e.key === ' ') {
            playSE('decide');
            if (cursorY === 0) onNewGame(); else onLoadGame();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [cursorY, onNewGame, onLoadGame]);

      return (
        <div className="w-full h-full flex flex-col items-center justify-between pt-12 pb-8 sm:pt-16" style={{ backgroundColor: '#375280' }}>
          <svg viewBox="0 0 800 320" className="w-full max-w-4xl mx-auto flex-shrink-0 drop-shadow-[0_15px_25px_rgba(0,0,0,0.6)]">
            <defs>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feMerge><feMergeNode in="blur" /><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
            </defs>

            {/* 日本列島 */}
            <g transform="translate(180, 140) scale(1.6) rotate(-10)" fill="black">
              <path d="M 50,-80 L 70,-80 L 90,-60 L 90,-40 L 70,-30 L 40,-40 Z" />
              <path d="M 40,-20 L 50,0 L 20,20 L -20,30 L -60,50 L -100,80 L -110,100 L -100,110 L -60,80 L -20,50 L 20,40 L 50,20 L 60,0 Z" />
              <path d="M -60,70 L -50,85 L -75,85 L -80,70 Z" />
              <path d="M -90,90 L -85,110 L -115,120 L -120,100 Z" />
            </g>

            {/* メインロゴ */}
            <g transform="translate(400, 160) rotate(-6) scale(1, 1.2)">
              {/* 文字の厚み表現 */}
              {[-12, -9, -6, -3, 0].map((offset, i, arr) => {
                const colors = ["#1f2937", "#374151", "#6b7280", "#d1d5db", "#ffffff"];
                const c = colors[i];
                const isFront = i === arr.length - 1;
                return (
                  <g key={offset} transform={`translate(${offset}, ${-offset})`}>
                    <text x="0" y="0" fontFamily="'Press Start 2P', cursive" fontSize="60" fill={c} textAnchor="middle">
                      JAPAN QUES<tspan fill="transparent">T</tspan>
                    </text>
                    {/* Tの代わりの剣 */}
                    <g transform="translate(305, 0) scale(0.75)" className={isFront ? "sword-glow" : ""}>
                      <polygon points="-15,-60 -15,5 0,40 15,5 15,-60" fill={isFront ? "#f8fafc" : c} />
                      {isFront && <polygon points="0,-60 0,40 15,5 15,-60" fill="#cbd5e1" />}
                      {/* つば */}
                      <rect x="-45" y="-75" width="90" height="15" fill={isFront ? "#e2e8f0" : c} />
                      {/* 柄 */}
                      <rect x="-10" y="-115" width="20" height="40" fill={isFront ? "#475569" : c} />
                      {/* 柄頭 */}
                      <circle cx="0" cy="-125" r="15" fill={isFront ? "#cbd5e1" : c} />
                    </g>
                  </g>
                );
              })}
              
              {/* 強烈な閃光 */}
              <g transform="translate(305, -35)">
                <circle cx="0" cy="0" r="40" fill="#fef08a" filter="url(#glow)" opacity="0.8" />
                <path d="M -4,-150 L 4,-150 L 8,-12 L 150,-4 L 150,4 L 8,12 L 4,150 L -4,150 L -8,12 L -150,4 L -150,-4 L -8,-12 Z" fill="white" filter="url(#glow)" />
              </g>
            </g>
          </svg>
          
          <div className="flex flex-col items-center font-pressstart text-white text-sm sm:text-xl tracking-[0.15em] w-full flex-1 justify-center mt-8">
            <div className="pixel-window p-8 flex flex-col gap-8 w-80">
              <div className="relative cursor-pointer hover:text-yellow-400 transition-colors" 
                   onClick={() => onNewGame()}>
                <span className="absolute -left-8">{cursorY === 0 ? '▶' : ''}</span>START
              </div>
              <div className="relative cursor-pointer hover:text-yellow-400 transition-colors" 
                   onClick={() => onLoadGame()}>
                <span className="absolute -left-8">{cursorY === 1 ? '▶' : ''}</span>CONTINUE
              </div>
            </div>
          </div>
          <div className="font-pressstart text-[#c1cbe0] text-xs sm:text-sm tracking-[0.2em] mt-4 opacity-70">
            ©2026 JQ PROJECT
          </div>
        </div>
      );
    }

    // ==========================================
    // 4. ゲームデータ
    // ==========================================
    const TILE_SIZE = 32;
    const prefRawData = [
      [1, '北海道', 71, 3, [['道庁所在地は？','札幌市','函館市','旭川市','小樽市'],['世界自然遺産は？','知床半島','積丹半島','根室半島','渡島半島']]],
      [2, '青森県', 66, 7, [['県庁所在地は？','青森市','弘前市','八戸市','むつ市'],['日本一の果物は？','りんご','みかん','もも','ぶどう']]],
      [13, '東京都', 61, 16, [['都庁所在地は？','新宿区','渋谷区','千代田区','港区'],['日本一高い塔は？','スカイツリー','東京タワー','通天閣','福岡タワー']]],
      [27, '大阪府', 55, 20, [['府庁所在地は？','大阪市','堺市','東大阪市','豊中市'],['名物の粉ものは？','たこ焼き','もんじゃ焼き','きしめん','ほうとう']]],
      [47, '沖縄県', 9, 36, [['県庁所在地は？','那覇市','沖縄市','うるま市','浦添市'],['かつての王国は？','琉球王国','大和朝廷','蝦夷島政府','邪馬台国']]]
      // (データ量を調整して軽量化)
    ];

    const mapLayout = [
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~..^*~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~.^^***.~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~..*^^^..~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~.^^^^*..~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~===~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~..*~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~.^^.~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*^^..~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~^..*.~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~^..*..~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*.~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~^..*..~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*..*~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~^..*.^..~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*..*..*~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~^.*...*..^~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*..*.^..~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*..*..*.~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*..*..~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~^..*.^..*~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*..*~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~^..*.^..~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*..*~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~^..*..~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*..~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~=~~~~=~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..~~~*..*~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*~~.^..*~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~^.~~~~*..~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~*..*~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~..~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~=~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~=.~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~..=..=..=..=..=..=..=..=..=..=..~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~*..~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~",
      "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~"
    ];

    // ==========================================
    // 5. アプリケーション本体
    // ==========================================
    function App() {
      const [user, setUser] = useState(null);
      const [audioStarted, setAudioStarted] = useState(false);
      const [gameState, setGameState] = useState('TITLE'); 
      const [heroName, setHeroName] = useState("");
      const [playerPos, setPlayerPos] = useState({ x: 61, y: 16 });
      const [clearedPrefs, setClearedPrefs] = useState([]); 
      const [saves, setSaves] = useState([]);
      const [encounterPref, setEncounterPref] = useState(null);
      const [savePhase, setSavePhase] = useState(0);

      const fb = window.JQ_FB;

      // Auth初期化
      useEffect(() => {
        const init = async () => {
          await window.JQ_AUTH_INIT();
          fb.auth.onAuthStateChanged(setUser);
        };
        init();
      }, []);

      // セーブデータ取得
      const fetchSaves = async () => {
        if (!user) return;
        const colRef = fb.firestore.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'saves');
        const snap = await fb.firestore.getDocs(colRef);
        setSaves(snap.docs.map(d => d.data()));
      };

      // セーブ実行
      const executeSave = async () => {
        if (!user) return;
        const docRef = fb.firestore.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'saves', heroName || 'ゆうしゃ');
        await fb.firestore.setDoc(docRef, { 
          heroName, playerPos, clearedPrefs, updatedAt: new Date().toISOString() 
        });
      };

      const handleMove = (dx, dy) => {
        if (gameState !== 'FIELD') return;
        setPlayerPos(prev => {
          const nx = prev.x + dx; const ny = prev.y + dy;
          if (ny < 0 || ny >= mapLayout.length || nx < 0 || nx >= mapLayout[0].length) return prev;
          if (mapLayout[ny][nx] === '~') return prev;
          
          const prefId = prefRawData.find(p => p[2] === nx && p[3] === ny)?.[0];
          if (prefId && !clearedPrefs.includes(prefId)) {
            const p = prefRawData.find(x => x[0] === prefId);
            setEncounterPref({ id: p[0], name: p[1] });
            return prev;
          }
          playSE('step');
          return { x: nx, y: ny };
        });
      };

      if (!audioStarted) return (
        <div className="fixed inset-0 flex items-center justify-center bg-black cursor-pointer z-50 text-white font-pressstart"
             onClick={() => { initAudio(); setAudioStarted(true); playBGM('title'); }}>
          <div className="animate-pulse">TAP TO START</div>
        </div>
      );

      if (gameState === 'TITLE') return (
        <TitleScreen 
          onNewGame={() => setGameState('NAME_INPUT')} 
          onLoadGame={async () => { await fetchSaves(); setGameState('LOAD_GAME'); }} 
        />
      );

      if (gameState === 'NAME_INPUT') return (
        <div className="w-screen h-screen flex items-center justify-center bg-black p-4 font-dotgothic text-white">
          <div className="pixel-window p-8 flex flex-col gap-6 w-full max-w-md">
            <p className="text-2xl">なまえを いれてください</p>
            <input type="text" value={heroName} onChange={e => setHeroName(e.target.value)} maxLength={6}
              className="bg-black text-white border-2 border-white p-3 text-3xl outline-none" />
            <button onClick={() => { if(heroName){ setGameState('FIELD'); playBGM('field'); } }} className="text-xl self-end hover:text-yellow-400">けってい</button>
          </div>
        </div>
      );

      if (gameState === 'LOAD_GAME') return (
        <div className="w-screen h-screen flex items-center justify-center bg-black p-4 font-dotgothic text-white">
          <div className="pixel-window p-6 flex flex-col gap-4 w-full max-w-lg max-h-[80%] overflow-y-auto">
            <p className="text-2xl mb-4 text-yellow-400">どの ぼうけんのしょ を ひらく？</p>
            {saves.length === 0 ? <p>きろくが ありません</p> : 
              saves.map((s, i) => (
                <button key={i} onClick={() => { setHeroName(s.heroName); setPlayerPos(s.playerPos); setClearedPrefs(s.clearedPrefs); setGameState('FIELD'); playBGM('field'); }} 
                  className="text-left border border-gray-600 p-4 hover:bg-white/10">
                  ゆうしゃ：{s.heroName} (せいは:{s.clearedPrefs.length})
                </button>
              ))
            }
            <button onClick={() => setGameState('TITLE')} className="mt-4 text-right">もどる</button>
          </div>
        </div>
      );

      return (
        <div className="w-screen h-screen bg-black font-dotgothic overflow-hidden relative">
          {/* フィールド表示 */}
          <div className="absolute inset-0 bg-[#1e3a8a]">
            <div className="absolute left-1/2 top-1/2 transition-transform duration-200"
                 style={{ transform: `translate(calc(-50% - ${playerPos.x * TILE_SIZE}px), calc(-50% - ${playerPos.y * TILE_SIZE}px))` }}>
              {mapLayout.map((row, y) => row.split('').map((tile, x) => (
                <div key={`${x}-${y}`} className={`absolute border border-black/5 ${tile==='~'?'bg-blue-600':tile==='^'?'bg-gray-400':'bg-green-500'}`} 
                     style={{ left: x*TILE_SIZE, top: y*TILE_SIZE, width: TILE_SIZE, height: TILE_SIZE }}>
                  {prefRawData.some(p => p[2]===x && p[3]===y) && <div className="text-center">🏰</div>}
                </div>
              )))}
              <div className="absolute text-2xl animate-bounce" style={{ left: playerPos.x*TILE_SIZE, top: playerPos.y*TILE_SIZE }}>🚶</div>
            </div>
          </div>

          {/* 操作ボタン */}
          <div className="absolute bottom-8 left-8 flex flex-col gap-2 opacity-80">
            <button className="pixel-window w-14 h-14" onClick={() => handleMove(0,-1)}>▲</button>
            <div className="flex gap-2">
              <button className="pixel-window w-14 h-14" onClick={() => handleMove(-1,0)}>◀</button>
              <button className="pixel-window w-14 h-14" onClick={() => handleMove(1,0)}>▶</button>
            </div>
            <button className="pixel-window w-14 h-14" onClick={() => handleMove(0,1)}>▼</button>
          </div>

          <div className="absolute bottom-8 right-8 flex gap-4 opacity-80">
            <button className="pixel-window w-16 h-16 rounded-full text-2xl" onClick={() => setSavePhase(1)}>書</button>
            <button className="pixel-window w-16 h-16 rounded-full text-2xl" onClick={() => playSE('cancel')}>Ｂ</button>
          </div>

          {/* セーブダイアログ */}
          {savePhase === 1 && (
            <div className="absolute inset-0 bg-black/70 flex items-center justify-center p-4 z-50 text-white">
              <div className="pixel-window p-6 w-full max-w-sm">
                <p className="text-xl mb-6">ぼうけんのしょ に きろくしますか？</p>
                <div className="flex justify-around">
                  <button onClick={async () => { setSavePhase(2); await executeSave(); setSavePhase(3); playSE('correct'); }} className="hover:text-yellow-400">はい</button>
                  <button onClick={() => setSavePhase(0)} className="hover:text-yellow-400">いいえ</button>
                </div>
              </div>
            </div>
          )}
          {savePhase === 2 && <div className="absolute inset-0 bg-black flex items-center justify-center z-50 text-white">きろくちゅう...</div>}
          {savePhase === 3 && (
            <div className="absolute inset-0 bg-black/70 flex items-center justify-center p-4 z-50 text-white" onClick={() => setSavePhase(0)}>
              <div className="pixel-window p-6 text-center">きろくが おわりました。 ▼</div>
            </div>
          )}

          {/* エンカウント */}
          {encounterPref && (
            <div className="absolute inset-0 bg-black/80 flex items-center justify-center p-4 z-50 text-white">
              <div className="pixel-window p-6 text-center">
                <p className="text-2xl mb-4">{encounterPref.name} に ついた！</p>
                <p className="mb-6">クイズに ちょうせんする？</p>
                <div className="flex justify-around">
                  <button onClick={() => { setEncounterPref(null); setClearedPrefs(prev => [...prev, encounterPref.id]); playSE('win'); }} className="hover:text-yellow-400">はい</button>
                  <button onClick={() => setEncounterPref(null)} className="hover:text-yellow-400">いいえ</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
